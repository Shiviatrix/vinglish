name: Daily Benchmarks

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ python3 golang
          npm install -g elm

      - name: Run Benchmarks
        run: cargo run --release --bin eng -- benchmark benchmarks --runs 5
